<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Helvetica,Arial,sans-serif">
  <rect width="900" height="460" fill="#fbfaf7"/>
  <text x="450" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Dent profile: what we have (gel) vs what neoprene does</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#666">deflection decay length  ℓ = cell · √(k_link / k_cell)   —   w(x) ∝ exp(−x/ℓ) outside the load</text>

  <!-- LEFT: current gel -->
  <g transform="translate(40,80)">
    <text x="190" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#b03a2e">TODAY — gel  (M3: ℓ = 2.2 mm ≪ t)</text>
    <text x="190" y="17" text-anchor="middle" font-size="11" fill="#888">k_link/k_cell = 0.2  →  neighbour holds only ~10-25% of dent</text>
    <!-- rest surface line -->
    <line x1="0" y1="90" x2="380" y2="90" stroke="#bbb" stroke-dasharray="4 3"/>
    <text x="384" y="93" font-size="9" fill="#999">rest</text>
    <!-- tiles: cliff profile -->
    <g stroke="#8a6d3b" stroke-width="0.6">
      <rect x="10"  y="90" width="34" height="70" fill="#e8dcc0"/>
      <rect x="46"  y="90" width="34" height="70" fill="#e8dcc0"/>
      <rect x="82"  y="90" width="34" height="70" fill="#e8dcc0"/>
      <rect x="118" y="93" width="34" height="67" fill="#e8dcc0"/>
      <!-- pressed tiles: deep -->
      <rect x="154" y="140" width="34" height="20" fill="#dcc39a"/>
      <rect x="190" y="140" width="34" height="20" fill="#dcc39a"/>
      <rect x="226" y="93"  width="34" height="67" fill="#e8dcc0"/>
      <rect x="262" y="90" width="34" height="70" fill="#e8dcc0"/>
      <rect x="298" y="90" width="34" height="70" fill="#e8dcc0"/>
      <rect x="334" y="90" width="34" height="70" fill="#e8dcc0"/>
    </g>
    <!-- finger -->
    <rect x="160" y="60" width="56" height="76" fill="#39424e" rx="2"/>
    <text x="188" y="52" text-anchor="middle" font-size="10" fill="#39424e">press</text>
    <!-- cliff callouts -->
    <path d="M150,95 L150,138" stroke="#b03a2e" stroke-width="2"/>
    <path d="M228,95 L228,138" stroke="#b03a2e" stroke-width="2"/>
    <text x="120" y="185" font-size="11" fill="#b03a2e">vertical WALL, one cell wide</text>
    <path d="M148,178 L150,140" stroke="#b03a2e" stroke-width="0.8" fill="none"/>
    <!-- consequences -->
    <g font-size="11" fill="#333">
      <text x="0" y="215">consequences:</text>
      <text x="10" y="233">• washer sits in a sharp pocket → SNAP to vertical when pushed</text>
      <text x="10" y="251">• square tip jams on the wall (tiles can't yield sideways)</text>
      <text x="10" y="269">• reads as gel/putty, not a pad</text>
    </g>
  </g>

  <!-- RIGHT: target neoprene -->
  <g transform="translate(480,80)">
    <text x="190" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e7a45">TARGET — neoprene pad  (ℓ ≈ t = 8–12 mm)</text>
    <text x="190" y="17" text-anchor="middle" font-size="11" fill="#888">k_link/k_cell ≈ (t/c)²·G/E′ ≈ 1.5–4  →  dish spans ~2ℓ each side</text>
    <line x1="0" y1="90" x2="380" y2="90" stroke="#bbb" stroke-dasharray="4 3"/>
    <text x="384" y="93" font-size="9" fill="#999">rest</text>
    <!-- tiles: smooth exponential dish -->
    <g stroke="#8a6d3b" stroke-width="0.6">
      <rect x="10"  y="90"  width="34" height="70" fill="#e8dcc0"/>
      <rect x="46"  y="92"  width="34" height="68" fill="#e8dcc0"/>
      <rect x="82"  y="97"  width="34" height="63" fill="#e6d8ba"/>
      <rect x="118" y="112" width="34" height="48" fill="#e2d0ac"/>
      <rect x="154" y="140" width="34" height="20" fill="#dcc39a"/>
      <rect x="190" y="140" width="34" height="20" fill="#dcc39a"/>
      <rect x="226" y="118" width="34" height="42" fill="#e2d0ac"/>
      <rect x="262" y="102" width="34" height="58" fill="#e6d8ba"/>
      <rect x="298" y="94"  width="34" height="66" fill="#e8dcc0"/>
      <rect x="334" y="91"  width="34" height="69" fill="#e8dcc0"/>
    </g>
    <!-- smooth envelope -->
    <path d="M10,90 C90,90 120,96 154,140 L224,140 C260,102 320,91 368,90"
          fill="none" stroke="#1e7a45" stroke-width="2" stroke-dasharray="5 3"/>
    <rect x="160" y="60" width="56" height="76" fill="#39424e" rx="2"/>
    <text x="188" y="52" text-anchor="middle" font-size="10" fill="#39424e">press</text>
    <!-- decay arrows -->
    <path d="M228,146 L300,146" stroke="#1e7a45" stroke-width="1.4" marker-end="url(#ag)"/>
    <text x="264" y="160" text-anchor="middle" font-size="10" fill="#1e7a45">exp(−x/ℓ) ramp</text>
    <g font-size="11" fill="#333">
      <text x="0" y="215">how: keep k_cell = 200–300 (same sink),</text>
      <text x="10" y="233">raise k_link → 400–1200  (= G·t, sponge neoprene)</text>
      <text x="10" y="251">• pocket walls become ramps → progressive ROLL</text>
      <text x="10" y="269">• neighbour steps small → square tip can ride them</text>
    </g>
  </g>

  <!-- bottom strip: material params -->
  <g transform="translate(40,400)" font-size="11.5" fill="#444">
    <rect x="-10" y="-16" width="830" height="46" fill="#f0ece2" rx="6"/>
    <text x="0" y="0">sponge neoprene:  E′ ≈ 0.2–0.5 MPa,  G ≈ E/3,  ν ≈ 0.25 (sponge) … 0.48 (solid)   →   k_cell = E′·c²/t ≈ 750 N/m,   k_link = G·t ≈ 1000 N/m</text>
    <text x="0" y="19">today (M3 "soft local"):  k_cell = 200,  k_link = 40   →   the shear layer is 10–20× too weak — that one ratio is the whole gel-vs-foam story</text>
  </g>

  <defs>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1e7a45"/>
    </marker>
  </defs>
</svg>
